name: Build ways CLI

on:
  push:
    branches: [main]
    tags: ['ways-v*']
    paths:
      - 'tools/ways-cli/**'
      - '.github/workflows/build-ways.yml'
  pull_request:
    paths:
      - 'tools/ways-cli/**'
      - '.github/workflows/build-ways.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            platform: darwin-x86_64
            os: macos-latest
          - target: aarch64-apple-darwin
            platform: darwin-arm64
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            os: windows-latest
            ext: .exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (Linux cross-compile)
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build (native)
        if: "!(runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu')"
        working-directory: tools/ways-cli
        env:
          RUSTFLAGS: ${{ matrix.target == 'x86_64-pc-windows-msvc' && '-C target-feature=+crt-static' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (zigbuild cross-compile)
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: tools/ways-cli
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp tools/ways-cli/target/${{ matrix.target }}/release/ways dist/ways-${{ matrix.platform }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item tools/ways-cli/target/${{ matrix.target }}/release/ways.exe dist/ways-${{ matrix.platform }}.exe

      # Native builds can run directly; cross-compiled binaries can only be verified with `file`
      - name: Smoke test (Unix)
        if: "runner.os != 'Windows' && !(matrix.target == 'aarch64-unknown-linux-gnu' && runner.os == 'Linux') && !(matrix.target == 'x86_64-apple-darwin' && runner.arch == 'ARM64')"
        run: dist/ways-${{ matrix.platform }} --version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: dist/ways-${{ matrix.platform }}.exe --version

      - name: Verify binary (cross-compiled — can't execute on this runner)
        if: "(matrix.target == 'aarch64-unknown-linux-gnu' && runner.os == 'Linux') || (matrix.target == 'x86_64-apple-darwin' && runner.arch == 'ARM64')"
        run: |
          file dist/ways-${{ matrix.platform }}
          ls -lh dist/ways-${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: ways-${{ matrix.platform }}
          path: dist/ways-${{ matrix.platform }}${{ matrix.ext }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run unit tests
        working-directory: tools/ways-cli
        run: cargo test
      - name: Run simulation tests
        working-directory: tools/ways-cli
        run: cargo test --test session_sim -- --test-threads=1

  collect:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum ways-* > checksums.txt
          cat checksums.txt
          ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: ways-all-platforms
          path: binaries/

  release:
    needs: collect
    if: startsWith(github.ref, 'refs/tags/ways-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ways-all-platforms
          path: binaries

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ways ${TAG#ways-}" \
            --notes "Pre-built ways CLI binaries for 5 platforms.

          Install: \`bash tools/ways-cli/download-ways.sh\`
          Or build from source: \`make ways\`" \
            binaries/*
